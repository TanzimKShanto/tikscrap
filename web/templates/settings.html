{% extends "base.html" %}
{% block title %}Settings - tikscrap{% endblock %}

{% block content %}
<div class="space-y-6">
    <!-- Header -->
    <div>
        <h1 class="text-3xl font-bold text-slate-900">Settings</h1>
        <p class="text-slate-500 mt-1">Configure your tikscrap configuration</p>
    </div>

    <!-- API Credentials -->
    <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
        <div class="px-6 py-4 border-b border-slate-200">
            <h2 class="text-lg font-semibold text-slate-900">API Credentials</h2>
        </div>
        <form method="post" action="/settings" class="p-6 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label for="ms_token" class="block text-sm font-medium text-slate-700 mb-2">TikTok MS_TOKEN</label>
                    <div class="relative">
                        <input type="password" id="ms_token" name="ms_token" 
                            class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:border-primary-500 focus:ring-2 focus:ring-primary-200 transition-colors outline-none"
                            placeholder="Leave empty to keep current">
                        <button type="button" onclick="document.getElementById('ms_token').type = document.getElementById('ms_token').type === 'password' ? 'text' : 'password'"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div>
                    <label for="fb_token" class="block text-sm font-medium text-slate-700 mb-2">Facebook Token</label>
                    <div class="relative">
                        <input type="password" id="fb_token" name="fb_token" 
                            class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:border-primary-500 focus:ring-2 focus:ring-primary-200 transition-colors outline-none"
                            placeholder="Leave empty to keep current">
                        <button type="button" onclick="document.getElementById('fb_token').type = document.getElementById('fb_token').type === 'password' ? 'text' : 'password'"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div>
                    <label for="fb_page_id" class="block text-sm font-medium text-slate-700 mb-2">Facebook Page ID</label>
                    <input type="text" id="fb_page_id" name="fb_page_id" value="{{ config.get('FB_PAGE_ID', '') }}"
                        class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:border-primary-500 focus:ring-2 focus:ring-primary-200 transition-colors outline-none">
                </div>
                <div>
                    <label for="ig_user_id" class="block text-sm font-medium text-slate-700 mb-2">Instagram User ID</label>
                    <input type="text" id="ig_user_id" name="ig_user_id" value="{{ config.get('IG_USER_ID', '') }}"
                        class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:border-primary-500 focus:ring-2 focus:ring-primary-200 transition-colors outline-none">
                </div>
            </div>
            <div>
                <label for="base_url" class="block text-sm font-medium text-slate-700 mb-2">Base URL (for image serving)</label>
                <input type="text" id="base_url" name="base_url" value="{{ config.get('BASE_URL', '') }}"
                    class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:border-primary-500 focus:ring-2 focus:ring-primary-200 transition-colors outline-none">
            </div>
            <div class="pt-4 border-t border-slate-200">
                <button type="submit" class="px-6 py-3 bg-primary-600 hover:bg-primary-700 text-white font-medium rounded-lg transition-colors">
                    Save API Settings
                </button>
            </div>
        </form>
    </div>

    <!-- Dashboard Credentials -->
    <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
        <div class="px-6 py-4 border-b border-slate-200">
            <h2 class="text-lg font-semibold text-slate-900">Dashboard Credentials</h2>
        </div>
        <form method="post" action="/settings" class="p-6 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label for="dashboard_username" class="block text-sm font-medium text-slate-700 mb-2">Username</label>
                    <input type="text" id="dashboard_username" name="dashboard_username" value="{{ config.get('dashboard', {}).get('username', 'admin') }}"
                        class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:border-primary-500 focus:ring-2 focus:ring-primary-200 transition-colors outline-none">
                </div>
                <div>
                    <label for="dashboard_password" class="block text-sm font-medium text-slate-700 mb-2">Password</label>
                    <input type="password" id="dashboard_password" name="dashboard_password" 
                        class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:border-primary-500 focus:ring-2 focus:ring-primary-200 transition-colors outline-none"
                        placeholder="Leave empty to keep current">
                </div>
            </div>
            <div class="pt-4 border-t border-slate-200">
                <button type="submit" class="px-6 py-3 bg-primary-600 hover:bg-primary-700 text-white font-medium rounded-lg transition-colors">
                    Save Dashboard Settings
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
